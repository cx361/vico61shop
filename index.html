<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICO61 SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fff; 
            color: #000; 
            height: 100vh; 
            overflow: hidden; /* Nicht scrollbar */
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 30px 50px;
            font-family: 'Syncopate', sans-serif;
            font-size: 32px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* Main Container: Split Layout */
        main {
            display: flex;
            flex: 1;
            padding: 0 50px 50px 50px;
            gap: 40px;
            align-items: center;
        }

        /* Linke Seite: Galerie */
        .gallery-section {
            flex: 1.2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #f4f4f4;
            position: relative;
            border-radius: 4px;
        }

        #main-image-viewer {
            width: 100%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #main-jersey-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            cursor: pointer;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            z-index: 10;
        }
        #nav-left { left: 10px; }
        #nav-right { right: 10px; }

        #view-indicator {
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 20px;
        }

        /* Rechte Seite: Formular */
        .order-section {
            flex: 0.8;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #000;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-radius: 0; /* Eckiger Look ist cooler */
        }

        .flex-row { display: flex; gap: 10px; }

        button {
            width: 100%;
            padding: 20px;
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Syncopate', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hidden { display: none; }

        #message {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
        }

        /* Responsive Fix für kleinere Screens */
        @media (max-height: 700px) {
            header { padding: 15px 50px; }
            input, select { padding: 10px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>

    <header>VICO61 SHOP</header>

    <main>
        <section class="gallery-section">
            <div id="main-image-viewer">
                <div class="nav-arrow" id="nav-left">←</div>
                <img id="main-jersey-image" src="jersey_baby_front.jpeg" alt="Jersey">
                <div class="nav-arrow" id="nav-right">→</div>
            </div>
            <div id="view-indicator">VORDERSEITE - HELLBLAU</div>
        </section>

        <section class="order-section">
            <form id="orderForm">
                <input type="text" name="name" placeholder="NAME" required>
                <input type="email" name="email" placeholder="EMAIL" required>
                
                <select name="farbe" id="farbeSelect" required>
                    <option value="hellblau">HELLBLAU (K7)</option>
                    <option value="dunkelblau">DUNKELBLAU (K7)</option>
                </select>

                <select name="groesse" required>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>

                <select name="nummer" required>
                    <option value="36">36</option>
                    <option value="61">61</option>
                    <option value="ohne">OHNE NUMMER</option>
                </select>

                <select name="versandart" id="versandart" required>
                    <option value="">LIEFERART WÄHLEN</option>
                    <option value="pickup">PICKUP (F&F CODE)</option>
                    <option value="versand">VERSAND (+5€)</option>
                </select>

                <div id="pickup-field" class="hidden">
                    <input type="text" id="fnf_input" placeholder="ENTER F&F CODE">
                </div>

                <div id="address-fields" class="hidden">
                    <input type="text" name="strasse" id="strasse" placeholder="STRASSE / NR">
                    <div class="flex-row">
                        <input type="text" name="plz" id="plz" placeholder="PLZ">
                        <input type="text" name="ort" id="ort" placeholder="STADT">
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled>BESTELLEN</button>
            </form>
            <div id="message"></div>
        </section>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwrg36-1bzzSIzTnI-9UyA3E9nWFrL3cwDcT7zNUnDvmiH4LOPcfEKJBFTUW_JIAOeL/exec';
        const SECRET_CODE = "VON36BIS61WESH";

        const images = {
            'hellblau': { front: 'jersey_baby_front.jpeg', back: 'jersey_baby_back.jpeg' },
            'dunkelblau': { front: 'jersey_navy_front.jpeg', back: 'jersey_navy_back.jpeg' }
        };

        let currentSide = 'front';
        let currentColor = 'hellblau';

        const imgElement = document.getElementById('main-jersey-image');
        const indicator = document.getElementById('view-indicator');
        const submitBtn = document.getElementById('submitBtn');
        const fnfInput = document.getElementById('fnf_input');

        // Galerie Update
        function updateUI() {
            imgElement.src = images[currentColor][currentSide];
            indicator.textContent = `${currentSide === 'front' ? 'VORDERSEITE' : 'RÜCKSEITE'} - ${currentColor.toUpperCase()}`;
            checkValidation();
        }

        document.getElementById('nav-left').onclick = () => { currentSide = currentSide === 'front' ? 'back' : 'front'; updateUI(); };
        document.getElementById('nav-right').onclick = () => { currentSide = currentSide === 'front' ? 'back' : 'front'; updateUI(); };
        imgElement.onclick = () => { currentSide = currentSide === 'front' ? 'back' : 'front'; updateUI(); };

        document.getElementById('farbeSelect').onchange = (e) => { currentColor = e.target.value; updateUI(); };

        // Versand Logik
        document.getElementById('versandart').onchange = (e) => {
            document.getElementById('pickup-field').classList.toggle('hidden', e.target.value !== 'pickup');
            document.getElementById('address-fields').classList.toggle('hidden', e.target.value !== 'versand');
            checkValidation();
        };

        // Code Validierung & Button Freischaltung
        function checkValidation() {
            const versand = document.getElementById('versandart').value;
            const name = document.getElementsByName('name')[0].value;
            
            if (versand === 'versand') {
                submitBtn.disabled = false;
                submitBtn.textContent = "BESTELLEN (+ 5€)";
            } else if (versand === 'pickup') {
                if (fnfInput.value === SECRET_CODE) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "BESTELLEN (PICKUP)";
                } else {
                    submitBtn.disabled = true;
                    submitBtn.textContent = "CODE REQUIRED";
                }
            } else {
                submitBtn.disabled = true;
            }
        }

        fnfInput.oninput = checkValidation;
        document.getElementById('orderForm').oninput = checkValidation;

        // Submit
        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = "SENDING...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            if(data.versandart === 'pickup') data.fnf_code = fnfInput.value;

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
            .then(() => {
                document.getElementById('message').innerHTML = "SUCCESS. VICO FAMILY.";
                e.target.reset();
                checkValidation();
            });
        };
    </script>
</body>
</html>
